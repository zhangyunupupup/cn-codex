name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell scripts
        run: |
          find . -name "*.sh" -exec bash -n {} \;
          find . -name "cn-codex*" -type f -exec bash -n {} \;

  build-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridge/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bridge/Cargo.lock') }}
      - name: Build
        working-directory: bridge
        run: cargo build --release
      - name: Test
        working-directory: bridge
        run: cargo test

  lint-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        working-directory: bridge
        run: cargo fmt -- --check
      - name: Clippy
        working-directory: bridge
        run: cargo clippy -- -D warnings

  release:
    needs: [check-scripts, build-bridge, lint-bridge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: cn-codex-bridge-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact: cn-codex-bridge-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: cn-codex-bridge-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cn-codex-bridge-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cn-codex-bridge-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bridge/target/${{ matrix.target }}/release/cn-codex-bridge*
