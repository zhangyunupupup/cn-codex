name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  check-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell scripts
        run: |
          find . -name "*.sh" -exec bash -n {} \;
          find . -name "cn-codex*" -type f -exec bash -n {} \;

  build-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridge/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bridge/Cargo.lock') }}
      - name: Build
        working-directory: bridge
        run: cargo build --release
      - name: Test
        working-directory: bridge
        run: cargo test

  lint-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        working-directory: bridge
        run: cargo fmt -- --check
      - name: Clippy
        working-directory: bridge
        run: cargo clippy -- -D warnings

  release:
    needs: [check-scripts, build-bridge, lint-bridge]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: cn-codex-bridge-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: cn-codex-bridge-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cn-codex-bridge-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: cn-codex-bridge-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build release
        working-directory: bridge
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bridge/target/${{ matrix.target }}/release/cn-codex-bridge*
          if-no-files-found: error

  # 创建 GitHub Release 并附上所有构建产物
  create-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: ls -la artifacts/*/
      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          # cn-codex v${{ github.ref_name }}

          让 OpenAI Codex CLI 开箱即用国产大模型。

          ## 安装

          ```bash
          curl -fsSL https://raw.githubusercontent.com/zhangyunupupup/cn-codex/main/install.sh | bash
          ```

          详情请查看 [README](https://github.com/zhangyunupupup/cn-codex#readme)。

          ## 下载

          根据你的平台下载对应二进制：
          EOF
          echo "" >> release-notes.md
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            echo "- \`${name}\`" >> release-notes.md
          done
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: cn-codex ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/*/*
